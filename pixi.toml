[workspace]
name = "paperclaw"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.12"

[pypi-dependencies]
paperclaw = { path = ".", editable = true }

[feature.dev.pypi-dependencies]
pytest = ">=8.2"
pytest-cov = ">=5.0"
ruff = ">=0.4"
black = ">=24"
prek = "*"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
test = "pytest"
lint = "ruff check src/ tests/"
fmt  = "black src/ tests/"
demo = { cmd = "python -c \"\nimport shutil\nfrom pathlib import Path\nroot  = Path('/tmp/paperclaw-demo')\ninbox = root / 'inbox'\nlib   = root / 'library'\nif root.exists():\n    shutil.rmtree(root)\ninbox.mkdir(parents=True)\nlib.mkdir(parents=True)\ndata = Path('tests/data')\nfor pat in ('*.pdf', '*.png'):\n    for f in data.glob(pat):\n        shutil.copy(f, inbox / f.name)\nprint(f'Inbox ready: {inbox}')\nprint(f'Library:     {lib}')\nprint()\nprint('Run:')\nprint(f'  paperclaw ingest --inbox {inbox} --library {lib}')\n\"" }
