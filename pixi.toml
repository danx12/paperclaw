[workspace]
name = "paperclaw"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.12"

[pypi-dependencies]
paperclaw = { path = ".", editable = true }

[feature.dev.pypi-dependencies]
pytest = ">=8.2"
pytest-cov = ">=5.0"
ruff = ">=0.4"
black = ">=24"
prek = "*"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
test = "pytest"
lint = "ruff check src/ tests/"
fmt  = "black src/ tests/"
