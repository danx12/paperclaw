repos:
  - repo: local
    hooks:
      - id: no-env-files
        name: Block .env files
        language: fail
        entry: "Refusing to commit .env files — store secrets in env vars or config.toml"
        files: '(^|/)\.env(\.|$)'

      - id: ruff-check
        name: ruff lint + autofix
        language: system
        entry: pixi run ruff check --fix
        types: [python]

      - id: black
        name: black format
        language: system
        entry: pixi run black
        types: [python]

      - id: pytest
        name: pytest (non-integration)
        language: system
        entry: pixi run pytest -m "not integration"
        pass_filenames: false
        always_run: true
