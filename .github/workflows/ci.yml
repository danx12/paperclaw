name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          environments: default
          cache: true

      - name: Run pre-commit hooks
        run: pixi run prek run --all-files --show-diff-on-failure

  tests:
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          environments: default
          cache: true

      - name: Integration tests
        run: pixi run pytest -m integration
